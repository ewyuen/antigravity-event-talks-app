<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Cloud BigQuery Release Notes Dashboard</title>
    <meta name="description" content="A premium interface to monitor and share the latest Google Cloud BigQuery releases and updates.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header / Navbar -->
        <header>
            <div class="brand">
                <div class="brand-logo">BQ</div>
                <div class="brand-info">
                    <h1>BigQuery Release Notes</h1>
                    <p><span class="status-dot" id="syncStatus"></span> <span id="statusText">Connected</span></p>
                </div>
            </div>
            
            <div class="controls-group">
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search release notes...">
                </div>
                
                <button id="themeToggleBtn" class="btn-action" title="Toggle theme">
                    <!-- Sun Icon (visible in dark mode) -->
                    <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                
                <button id="refreshBtn" class="btn-action" title="Refresh Feed">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Bar -->
        <section class="stats-container">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Updates</h3>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-icon total">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Features</h3>
                    <div class="stat-value" id="statFeatures">0</div>
                </div>
                <div class="stat-icon features">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>Changes</h3>
                    <div class="stat-value" id="statChanges">0</div>
                </div>
                <div class="stat-icon changes">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-info">
                    <h3>Deprecations</h3>
                    <div class="stat-value" id="statDeprecations">0</div>
                </div>
                <div class="stat-icon deprecations">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Filters Grid -->
        <div class="filters-wrapper">
            <div class="filter-chips" id="filterChips">
                <button class="filter-chip active" data-filter="all">All Updates</button>
                <button class="filter-chip" data-filter="feature">Features</button>
                <button class="filter-chip" data-filter="change">Changes</button>
                <button class="filter-chip" data-filter="deprecation">Deprecations</button>
            </div>
            
            <div class="results-meta">
                Showing <span id="filteredCount">0</span> of <span id="totalCount">0</span> items
            </div>
        </div>

        <!-- Releases Container -->
        <main class="releases-grid" id="releasesGrid">
            <!-- Dynamically populated via JS -->
            <div class="no-results">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="2" y2="22"></line>
                    <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"></path>
                    <path d="M21 16V9a2 2 0 0 0-2-2h-7"></path>
                    <path d="M12 5h7V2l-3.5 3.5L12 2v3"></path>
                </svg>
                <h3>Loading Release Notes</h3>
                <p>Connecting to Google Cloud RSS feeds and parsing updates...</p>
            </div>
        </main>
    </div>

    <!-- Tweet Modal -->
    <div class="modal-overlay" id="tweetModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">Draft Tweet</h2>
                <button class="btn-close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="tweet-box-wrapper">
                <textarea class="tweet-textarea" id="tweetContent" maxlength="280"></textarea>
            </div>
            <div class="tweet-meta">
                <span class="char-counter" id="charCounter">
                    <svg class="circular-progress" id="progressRing">
                        <circle class="circular-progress-bg" cx="10" cy="10" r="8"></circle>
                        <circle class="circular-progress-fill" id="progressFill" cx="10" cy="10" r="8"></circle>
                    </svg>
                    <span id="charCountText">280</span>
                </span>
                <span style="font-size: 0.8rem; color: var(--text-muted);">#BigQuery #GoogleCloud</span>
            </div>
            <div class="modal-footer-btns">
                <button class="btn-modal-action copy" id="copyTweetBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy Text
                </button>
                <button class="btn-modal-action tweet-post" id="postTweetBtn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Post on X
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
